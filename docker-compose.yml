services:

  ollama:
    image: ollama/ollama
    container_name: elucidate-ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elucidate:
    build: .
    container_name: elucidate-app
    ports:
      - "3000:3000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./pdf:/app/pdf
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.2:latest
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - TOP_K=5
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=150
      - OLLAMA_CONTEXT_LENGTH=4096
      - CHROMA_DB_PATH=/app/chroma_db
    depends_on:
      ollama:
        condition: service_healthy