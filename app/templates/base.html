<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ELUCIDATE{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #111111;
      --surface:   #1c1c1c;
      --surface-2: #242424;
      --border:    #2e2e2e;
      --border-2:  #3a3a3a;
      --muted:     #555;
      --dim:       #888;
      --text:      #c4c4c4;
      --bright:    #f0f0f0;
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0,212,255,0.1);
      --cyan-glow: rgba(0,212,255,0.3);
      --font:      'JetBrains Mono', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--bright);
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .nav-logo .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .nav-item {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: color 0.15s;
    }

    .nav-item:hover { color: var(--text); }

    .nav-item::before {
      content: '•';
      font-size: 14px;
      color: var(--border-2);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--cyan);
      background: transparent;
      border: 1px solid var(--cyan);
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--cyan-dim);
      box-shadow: 0 0 14px var(--cyan-glow);
    }

    .btn:active { opacity: 0.7; }

    .btn-ghost {
      border-color: var(--border-2);
      color: var(--dim);
    }

    .btn-ghost:hover {
      border-color: var(--muted);
      color: var(--text);
      background: var(--surface);
      box-shadow: none;
    }

    /* ── Tags ── */
    .tag {
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border: 1px solid;
    }
    .tag-ok      { color: var(--cyan); border-color: rgba(0,212,255,0.25); }
    .tag-pending { color: var(--muted); border-color: var(--border); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      padding: 9px 16px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.toast-ok  { color: var(--cyan); border-color: rgba(0,212,255,0.35); }
    .toast.toast-err { color: #ff5555; border-color: rgba(255,85,85,0.35); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="nav-logo">
        <span class="dot"></span>
        ELUCIDATE
      </a>
      {% block nav_items %}{% endblock %}
    </div>
    {% block nav_right %}{% endblock %}
  </nav>
  {% block content %}{% endblock %}
  <div class="toast" id="toast"></div>
  <script>
    let _toastTimer;
    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' toast-' + type : '');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
    }
  </script>
</body>
</html>
